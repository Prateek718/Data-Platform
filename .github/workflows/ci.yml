# CI — the lightweight gate, mirroring the local pre-commit/pre-push hooks so CI and local agree.
# This is the "check" portion ONLY: lint, format-check, strict types, tests. NOT the Stage 10
# Docker/deployment packaging. The hermetic test suite blocks network, so no secrets are needed.
name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to avoid redundant work.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.23" # pinned to match the local toolchain
          enable-cache: true

      - name: Install the project (locked)
        run: uv sync --frozen

      # The four checks, identical to .pre-commit-config.yaml (ruff/format/mypy at commit,
      # pytest at push). Run unconditionally so every failure in a push/PR is reported.
      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format --check)
        run: uv run ruff format --check .

      - name: Type check (mypy strict)
        run: uv run mypy src tests

      - name: Tests (pytest)
        run: uv run pytest
