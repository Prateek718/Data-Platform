# CI — the gate, mirroring the local pre-commit/pre-push hooks so CI and local agree: lint,
# format-check, strict types, tests. The hermetic test suite blocks network, so no secrets are
# needed. A second job builds the container image to prove a fresh checkout still produces one —
# build ONLY: nothing is pushed to a registry and nothing is deployed.
name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to avoid redundant work.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.23" # pinned to match the local toolchain
          enable-cache: true

      - name: Install the project (locked)
        run: uv sync --frozen

      # The four checks, identical to .pre-commit-config.yaml (ruff/format/mypy at commit,
      # pytest at push). Run unconditionally so every failure in a push/PR is reported.
      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format --check)
        run: uv run ruff format --check .

      - name: Type check (mypy strict)
        run: uv run mypy src tests

      - name: Tests (pytest)
        run: uv run pytest

  # Prove the image still builds from a clean checkout. It is not pushed anywhere and not run
  # against the network: the dataset is fetched at container START (and verified twice), not at
  # build time, so this job needs no release download and no secrets.
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build the image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: data-platform:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # A built image that cannot start is not a build worth trusting: check the entry point exists
      # and runs as a non-root user. (Serving needs the dataset, which is a runtime concern.)
      - name: Smoke-check the image
        run: |
          test "$(docker run --rm --entrypoint id -u data-platform:ci)" != "0"
          docker run --rm --entrypoint data-platform-bootstrap data-platform:ci --help > /dev/null
